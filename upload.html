<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="hr"></div>
      <h2 class="h2">OCR Document Upload</h2>

      <div class="row" style="margin-top:16px;">
        <button class="btn" type="button">Open Camera</button>
        <button class="btn" type="button">Upload Image</button>
      </div>

      <div class="preview-box">
        <div>
          <div style="font-size:1.4rem; margin-bottom:8px;">Image Preview</div>
          <div>(empty until upload)</div>
        </div>
      </div>

      <button class="btn" type="button">Scan Document</button>

      <div class="hr" style="margin-top:18px;"></div>
      <div class="row">
        <a class="btn" href="./processing.html">Next: Processing</a>
        <a class="btn" href="./index.html">Back to Menu</a>
      </div>
    </section>
  </main>
</body>
</html>
