<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="upload">
  <main class="page">
    <section class="card">
      <div class="topbar">
        <h2 class="h2">OCR Document Upload</h2>
        <span id="backendStatus" class="status-chip">Backend: checking...</span>
      </div>
      <div class="hr"></div>

      <div class="row" style="margin-top:10px;">
        <input id="fileInput" class="input" type="file" accept="image/*" capture="environment" />
      </div>

      <div class="preview-box">
        <div>
          <div style="font-size:1.4rem; margin-bottom:8px;">Camera / Upload Input</div>
          <div>Choose image then tap Scan Document</div>
        </div>
      </div>

      <div class="row">
        <button id="scanBtn" class="btn" type="button">Scan Document</button>
      </div>
      <p id="scanMsg" class="note"></p>

      <div class="hr" style="margin-top:18px;"></div>
      <div class="row">
        <a class="btn" href="./index.html">Back to Menu</a>
        <a class="btn" href="./records.html">View Records</a>
      </div>
    </section>
  </main>
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
