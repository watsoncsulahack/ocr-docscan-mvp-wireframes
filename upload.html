<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="upload">
  <main class="container">
    <header class="hero">
      <h1>Upload Document</h1>
      <p>Select a PDF or image to begin scanning.</p>
    </header>

    <section class="card">
      <p class="muted">Local mode: backend is auto-detected (offline-first).</p>

      <div class="drop-zone">
        <input id="fileInput" type="file" accept=".pdf,image/*" />
      </div>

      <div class="actions-inline">
        <button id="openCamera" class="btn secondary" type="button">Use Camera</button>
      </div>

      <p id="fileMeta" class="muted">No file selected.</p>
      <img id="filePreview" class="preview hidden" alt="Selected file preview" />

      <div id="uploadError" class="error hidden"></div>

      <div class="actions">
        <button id="processBtn" class="btn" type="button" disabled>Process</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
