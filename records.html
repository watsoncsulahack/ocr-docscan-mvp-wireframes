<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Records - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="hr"></div>
      <h2 class="h2">Stored Records</h2>

      <table class="table" aria-label="stored records">
        <thead>
          <tr>
            <th>Container</th>
            <th>Date</th>
            <th>Corrected</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>ABCD1234567</td>
            <td>04/13/2026</td>
            <td>Yes</td>
          </tr>
          <tr>
            <td>WXYZ7654321</td>
            <td>04/12/2026</td>
            <td>No</td>
          </tr>
        </tbody>
      </table>

      <div class="hr" style="margin-top:20px;"></div>
      <div class="row">
        <a class="btn" href="./upload.html">Back to Upload</a>
        <a class="btn" href="./index.html">Back to Menu</a>
      </div>
    </section>
  </main>
</body>
</html>
