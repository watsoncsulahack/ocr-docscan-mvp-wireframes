<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="review">
  <main class="page">
    <section class="card">
      <div class="topbar">
        <h2 class="h2">Review Extracted Data</h2>
        <span id="backendStatus" class="status-chip">Backend: checking...</span>
      </div>
      <div class="hr"></div>

      <div class="field">
        <label class="label">Uploaded Image (for comparison)</label>
        <div class="preview-box" style="min-height: 120px;">
          <img id="uploadedPreviewImg" alt="Uploaded preview" style="display:none; max-width:100%; max-height:280px; border-radius:8px; border:1px solid var(--line);" />
          <span id="uploadedPreviewHint" class="note">No preview available.</span>
        </div>
      </div>

      <div class="field">
        <label class="label" for="containerNo">Container Number:</label>
        <input class="input" id="containerNo" placeholder="ABCD1234567" />
      </div>

      <div class="field">
        <label class="label" for="eventDate">Event Date (MM/DD/YYYY):</label>
        <input class="input" id="eventDate" placeholder="04/13/2026" />
      </div>

      <p class="note">Review and correct values before final save.</p>
      <p id="reviewMsg" class="note"></p>
      <pre id="scanDebug" class="note" style="white-space:pre-wrap; border:1px dashed #2a3440; padding:10px; border-radius:8px; max-height:180px; overflow:auto;"></pre>

      <div class="hr" style="margin-top:22px;"></div>
      <div class="row">
        <button id="confirmBtn" class="btn" type="button">Confirm Submission</button>
      </div>

      <div class="hr" style="margin-top:18px;"></div>
      <div class="row">
        <a class="btn" href="./upload.html">Back to Upload</a>
      </div>
    </section>
  </main>
  <script src="./config.js?v=20260414g"></script>
  <script src="./app.js?v=20260414g"></script>
</body>
</html>
