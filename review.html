<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="review">
  <main class="container">
    <header class="hero">
      <h1>Review items below</h1>
      <p>Check highlighted fields before submitting.</p>
    </header>

    <section class="card">
      <div id="reviewError" class="error hidden">Review these items before submitting.</div>

      <form id="reviewForm" class="review-form" autocomplete="off">
        <label class="field-row" id="row-containerNo">
          <span class="field-label"><span id="dot-containerNo" class="confidence-dot"></span>Container Number</span>
          <input id="containerNo" class="input" type="text" placeholder="ABCD1234567" />
        </label>

        <label class="field-row" id="row-eventDate">
          <span class="field-label"><span id="dot-eventDate" class="confidence-dot"></span>Event Date</span>
          <input id="eventDate" class="input" type="text" placeholder="MM/DD/YYYY" />
        </label>
      </form>

      <div class="legend">
        <span><i class="confidence-dot green"></i> Good</span>
        <span><i class="confidence-dot yellow"></i> Review</span>
        <span><i class="confidence-dot red"></i> Fix required</span>
      </div>

      <div class="actions-inline">
        <button id="rerunScan" class="btn secondary" type="button">Re-Run Scan</button>
        <button id="submitBtn" class="btn" type="button">Confirm & Submit</button>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
