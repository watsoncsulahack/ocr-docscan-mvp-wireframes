<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="hr"></div>
      <h2 class="h2">Review Extracted Data</h2>

      <div class="field">
        <label class="label" for="containerNo">Container Number:</label>
        <input class="input" id="containerNo" value="ABCD1234567" />
      </div>

      <div class="field">
        <label class="label" for="eventDate">Event Date:</label>
        <input class="input" id="eventDate" value="04/13/2026" />
      </div>

      <p class="note">If no date is detected, default to upload time (MM/DD/YYYY) and allow user correction.</p>

      <div class="hr" style="margin-top:22px;"></div>
      <div class="row">
        <button class="btn" type="button">Confirm Submission</button>
      </div>

      <div class="hr" style="margin-top:18px;"></div>
      <div class="row">
        <a class="btn" href="./confirmation.html">Next: Confirmation</a>
        <a class="btn" href="./processing.html">Back to Processing</a>
      </div>
    </section>
  </main>
</body>
</html>
