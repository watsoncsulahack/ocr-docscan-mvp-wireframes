<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OCR MVP Demo</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="upload">
  <main class="container">
    <header class="hero">
      <div class="title-row">
        <h1>OCR MVP Demo</h1>
        <div class="status-indicator" aria-label="confidence colors">
          <span class="confidence-dot green" title="Green"></span>
          <span class="confidence-dot yellow" title="Yellow"></span>
          <span class="confidence-dot red" title="Red"></span>
        </div>
      </div>
      <p>Select a file to upload and process.</p>
    </header>

    <section class="card">
      <div class="drop-zone">
        <input id="fileInput" type="file" accept=".pdf,image/*" />
      </div>

      <div class="actions-inline">
        <button id="openCamera" class="btn secondary" type="button">Use Camera</button>
      </div>

      <p id="fileMeta" class="muted">No file selected.</p>
      <img id="filePreview" class="preview hidden" alt="Selected file preview" />
      <div id="uploadError" class="error hidden"></div>

      <div class="actions">
        <button id="processBtn" class="btn" type="button" disabled>Process</button>
      </div>

      <p class="muted">Supported file types: PNG, JPEG, PDF</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
