<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing - OCR MVP</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="processing">
  <main class="container">
    <header class="hero">
      <h1>Processing</h1>
      <p>We are scanning your file now.</p>
    </header>

    <section class="card">
      <div class="progress-stack">
        <div class="progress-item" id="step1">1. Upload received</div>
        <div class="progress-item" id="step2">2. Running scan</div>
        <div class="progress-item" id="step3">3. Preparing review screen</div>
      </div>
      <p id="processingMsg" class="muted">Starting scan...</p>
      <div id="processingError" class="error hidden"></div>
      <div class="actions">
        <a class="btn secondary" href="./upload.html">Back to Upload</a>
      </div>
    </section>
  </main>

  <script src="./app.js?v=20260505a"></script>
</body>
</html>
